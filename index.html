<!doctype html>
<html>
<head>

<link rel = "icon" href = "favicon.ico">

<title>
Hózárás előrehaladás
</title>

<style>

	:root {
		
		--body-bg: #FCE7C8;
		--container-bg: #FEF9F4;
		
		--text: #131010;
		
		--border: #543A14;
		
		--shadow: rgba(0,0,0,0.15);
		
		--button-bg: #FDEFE2;
		
		--progress: #B1C29E;
		
		--status-folyamatban: #FADA7A;
		--status-kesz: #B1C29E;
		--status-megsem: #FEF9F4;
	
	}

	body.dark {
	
		--body-bg: #2F578A;
		--container-bg: #121358;
		
		--text: #FEF9F4;
		
		--border: #2845D6;
		
		--shadow: rgba(0,0,0,0.3);
		
		--button-bg: #232F72;
		
		--progress: #36ADA3;
		
		--status-folyamatban: #F68048;
		--status-kesz: #36ADA3;
		--status-megsem: #121358;
	
	}

	body {
		font-family: Arial;
		color: var(--text);
		background: var(--body-bg);
	}

	.container {
		position: relative;
		
		min-width: 700px;
		max-width: 750px;
		
		margin: 20px auto;
		padding: 20px;
		
		background: var(--container-bg);
		border: 1px solid var(--border);
		border-radius: 10px;
		
		box-shadow: 0 2px 8px var(--shadow);
	}

	.cim {
		display: flex;
		justify-content: center;
		align-items: center;
		font-weight: bold;
		gap: 15px;
	}
	
	.cim h1 {
		margin: 0;
	}
	
	.cim-kepek {
	}
		
	.bal-kep {
		position: absolute;
		
		top: 15px;
		left: 40px;
		
		width: 80px;
		height: 80px;
	}
	
	.jobb-kep {
		position: absolute;
		
		top: 15px;
		right: 40px;
		
		width: 80px;
		height: 80px;
	}
	
	.themeSwitcher {
		display: flex;
		align-items: center;
		justify-content: center;
		gap: 6px;
		
		font-size: 11px;
		
		margin-top: 10px;
		margin-bottom: 10px;
	}
	
	.themeLabel {
		display: flex;
		align-items: center;
		
		transition: 0.25s;
		font-weight: normal;
	}
	
	.themeLabel.active {
		font-weight: bold;
	}
	
	.switch input {
		display: none;
	}
	
	.switch {
		position: relative;
		
		width: 36px;
		height: 18px;
		
		display: inline-block;
	}
	
	.slider {
		position: absolute;
		
		top: 0;
		left: 0;
		right: 0;
		bottom: 0;
		
		background: var(--container-bg);
		
		border: 1px solid var(--border);
		border-radius: 10px;
		
		cursor: pointer;
		
		transition: .30s;
	}
	
	.slider::before {
		
		content: "";
		
		position: absolute;
		
		width: 14px;
		height: 14px;
		
		left: 1px;
		top: 1px;
		
		border-radius: 50%;
		
		background: var(--text);
		
		transition: .30s;
		
	}
	
	.switch input:checked + .slider::before {
		
		transform: translateX(18px);
		
	}

	.toolbar {
		display: flex;
		justify-content: center;
		align-items: center;
		gap: 15px;
		margin-top: 20px;
		margin-bottom: 15px;
	}
		
	.progress-container {
		width: 250px;
		height: 20px;
		
		border: 1px solid var(--border);
		border-radius: 10px;
		
		overflow: hidden;
		
		box-shadow: 0 2px 8px var(--shadow);
	}
		
	#progress-bar {
		width: 0%;
		height: 100%;
		
		background-color: var(--progress);
		
		transition: width 0.3s;
	}
	
	#last-update {
		text-align: center;
		font-size: 13px;
		color: var(--text);
		margin-top: 4px;
		margin-bottom: 10px;
	}

	li {
		font-weight: bold;
		padding: 4px;
		margin: 4px 0;
		border-radius: 10px;
	}
	
	.taskRow {
		display: flex;
		align-items: center;
		gap: 6px;
	}
	
	.taskTitle {
		font-weight: bold;
	}
	
	.statusButtons {
		display: flex;
		gap: 2px;
	}
	
	button {
		border: 1px solid var(--border);
		border-radius: 10px;
		background-color: var(--button-bg);
		color: var(--text);
		box-shadow: 0 2px 8px var(--shadow);
	}
			
	.folyamatban {
		background-color: var(--status-folyamatban);
	}
		
	.kesz {
		background-color: var(--status-kesz);
	}
		
	.megsem {
		background-color: var(--status-megsem);
	}
	
	.separator {
		margin-left: 8px;
		margin-right: 6px;
		color: var(--text);
		font-weight: bold;
	}
	
	select {
		border: 1px solid var(--border);
		border-radius: 10px;
		background-color: var(--button-bg);
		color: var(--text);
		box-shadow: 0 2px 8px var(--shadow);
	}

	.statusTime {
		font-size: 10px;
		color: var(--text);
		font-weight: normal;
	}
	
	.visszaallitas {
		text-align: center;
		margin-top: 30px;
	}
	
	.visszaallitas button {
		font-size: 9px;
		color: var(--text);
	}

</style>

</head>

<body>

<div class="container">

	<div class="cim">
		
		<h1> Hózárás előrehaladás </h1>
		
	</div>
	
	<div class="cim-kepek">
		
		<img src="busy.png" class="bal-kep">
		
		<img src="almost-done.png" class="jobb-kep">
		
	</div>
	
	<div class="themeSwitcher">
		
		<span id="lightLabel" class="themeLabel active">
			☀️ 
			Világos
		</span>
		
		<label class="switch">
		
			<input type="checkbox" id="themeToggle">
			
			<span class="slider"></span>
		
		</label>
		
		<span id="darkLabel" class="themeLabel">
			Sötét
			 🌙
		</span>
		
	</div>
	
	<div class="toolbar">
		<div class="progress-container">
			<div id="progress-bar"></div>
		</div>
		
		<span id="progress-text"> Betöltés... </span>
	</div>
	
	<div id="last-update"> </div>

		<br>
	<div class="lista">
		<ul id="taskLista">
			
		</ul>
	</div>
	
	<br><br><br>
	
	<div class="visszaallitas">
		<button onclick="visszaallit()">
			Lista visszaállítása
		</button>
	</div>
	
</div>

<script src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

	const supabaseUrl = "https://fgqtddzmggjdxlfsvufc.supabase.co";
	const supabaseKey = "sb_publishable_xf80MZPSOCJXBgGI-qKApA_wx7mLWJi";
	const sb = window.supabase.createClient(supabaseUrl, supabaseKey);
	
	let nyitandoTask = null;
	
	const mentettTema = localStorage.getItem("theme");
	
	const themeToggle = document.getElementById("themeToggle");
	
	if (mentettTema === "dark") {
		themeToggle.checked = true;
	}
	
	alkalmazTema();
	
	async function betoltFeladatok() {
		
		const {data, error}=await sb
			.from("tasks")
			.select("*")
			.order("sort_order");
		
		const {data: users, error: usersError}=await sb
			.from("users")
			.select("*")
			.order("id");
		
		if (error) {
			console.error(error);
			return;
		}
		
		if (usersError) {
			console.error(usersError);
			return;
		}
		
		const lista = document.getElementById("taskLista");
		
		lista.innerHTML = "";

		data.forEach(function(task) {

			const ujLi = document.createElement("li");
				
			ujLi.innerHTML = `
				<div class="taskRow">
					<span class="taskTitle">
						${task.title}
					</span>
					
					<div class="statusButtons">
						<button onclick = "statusValtas(this, 'folyamatban')"> folyamatban </button>
						<button onclick = "statusValtas(this, 'kesz')"> kész </button>
						<button onclick = "statusValtas(this, 'megsem')"> mégsem </button>
					</div>
					
					<select class="userSelect"></select>
					
					<span class="statusInfo">
						<span class="separator"></span>
						<span class="statusTime"></span>
					</span>
				
				</div>
				
			`;
				
			ujLi.dataset.task = task.name;
				
			const select = ujLi.querySelector(".userSelect");

			const statusTime =ujLi.querySelector(".statusTime");
			
			const separator = ujLi.querySelector(".separator");
				
			users.forEach(function(user) {
					
				const option = document.createElement ("option");
					
				option.value = user.id;
					
				option.textContent = user.display_name;
					
				select.appendChild(option);
					
			});
				
			select.value = task.assigned_to;
				
			select.dataset.task = task.name;
				
			select.addEventListener("change", function () {
				
				felhasznaloValtas(select);
				
			});
				
			if (task.status_time) {
				separator.textContent = "·";
				statusTime.textContent = formatDatum(task.status_time);
			} else {
				separator.textContent = "";
				statusTime.textContent = "";
			}

			lista.appendChild(ujLi);
				
			if (task.name === nyitandoTask) {
					
				if (typeof select.showPicker === "function") {
					select.showPicker();
				} else {
					select.focus();
				}
					
				nyitandoTask = null;
					
			}
				
			if (task.status === "folyamatban") {
					ujLi.classList.add("folyamatban");

				} else if (task.status === "kesz") {
					ujLi.classList.add("kesz");
			}
		});
		
		const legfrissebb = data.reduce((max, task) => {
		
			if (!task.status_time) return max;
		
			if (!max) return task.status_time;

			return task.status_time > max
				? task.status_time
				: max;
		}, null);

		if (legfrissebb) {

			document.getElementById("last-update").textContent =
				"Utolsó módosítás: " + formatDatum(legfrissebb);

		} else {
			
			document.getElementById("last-update").textContent = "";

		}

	}

	// UTC időpont átalakítása helyi időre
	function formatDatum(datum) {

		if (!datum) {
			return "";
		}

		const d = new Date(datum);

		const ev = d.getFullYear();
		const honap = String(d.getMonth() + 1).padStart(2, "0");
		const nap = String(d.getDate()).padStart(2, "0");

		const ora = String(d.getHours()).padStart(2, "0");
		const perc = String(d.getMinutes()).padStart(2, "0");
		const masodperc = String(d.getSeconds()).padStart(2, "0");
		
		return `${ev}.${honap}.${nap}. ${ora}:${perc}:${masodperc}`;

	}

	function frissitProgress() {

		let osszes = document.querySelectorAll("li").length;
		
		let kesz = document.querySelectorAll("li.kesz").length;
		
		let szazalek = 0
			
		if (osszes > 0) {
			szazalek = Math.round((kesz / osszes) * 100);
		}
		
		document.getElementById("progress-bar").style.width = szazalek + "%";
		
		document.getElementById("progress-text").innerText = kesz + " / " + osszes + " kész (" + szazalek + "%)";
	}
	
	async function statusValtas(button, ujStatusz) {
				
		const taskElement = button.closest("li");

		const taskName = taskElement.dataset.task;
		
		if (ujStatusz !== "megsem") {
			nyitandoTask = taskName;
		} else {
			nyitandoTask = null;
		}
		
		let updateData = {
			status: ujStatusz,
			status_time: new Date().toISOString()
		};
		
		if (ujStatusz === "megsem") {
			updateData.assigned_to = 0;
			updateData.status_time = null;
		}
		
    	const { error } = await sb
       		.from("tasks")
			.update(updateData)
        	.eq("name", taskName);
		
    	if (error) {
        	console.error(error);
        	return;
    	}

	}
	
	async function felhasznaloValtas(select) {
					
		const taskName = select.dataset.task;
		
		const userId = select.value;
		
		const { error } = await sb
       		.from("tasks")
			.update({ assigned_to: userId })
        	.eq("name", taskName);
		
		if (error) {
			console.error(error);
			return;
		}
		
	}
	
	async function visszaallit() {
		
		if (!confirm("Biztosan vissza szeretnéd állítani az összes elemet?")) {
			return;
			}
		
		const { error } = await sb
			.from("tasks")
			.update({
				status: "megsem",
				assigned_to: 0,
				status_time: null
				})
			.neq("id", 0);
				
		if (error) {
				console.error(error);
				return;
			}
		
	}
	
	async function frissitOldal() {
		await betoltFeladatok();
		frissitProgress();
	}

	frissitOldal().catch(console.error);
		
	sb
		.channel("tasks-changes")
		.on(
			"postgres_changes",
			{
				event: "*",
				schema: "public",
				table: "tasks"
			},
			async function(payload) {
								
				console.log("Realtime:", payload);
				
				await frissitOldal();
				
			}
		)
		.subscribe((status, err) => {
			
			console.log("Realtime státusz:", status);
			console.log("Realtime hiba:", err);
			
		});
		
	function alkalmazTema() {
	
		const themeToggle = document.getElementById("themeToggle");
	
		const lightLabel = document.getElementById("lightLabel");
		const darkLabel = document.getElementById("darkLabel");
	
		if (themeToggle.checked) {
			document.body.classList.add("dark");
			
			localStorage.setItem("theme", "dark");
			
			lightLabel.classList.remove("active");
			darkLabel.classList.add("active");
		
		} else {
		
			document.body.classList.remove("dark");
			
			localStorage.setItem("theme", "light");
			
			darkLabel.classList.remove("active");
			lightLabel.classList.add("active");
		
		}
			
	}
	
	themeToggle.addEventListener("change", alkalmazTema);
	
	
</script>

</body>

</html>
